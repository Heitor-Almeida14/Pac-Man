<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Premium Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1 style="margin-top: 0;">PAC-MAN</h1>

    <div id="game-cabinet">
        <div id="ui-header">
            <div class="stat-box">PONTOS<br><span id="sc-val" class="val">0</span></div>
            <div class="stat-box">NÍVEL<br><span id="lv-val" class="val">1</span></div>
            <div class="stat-box">VIDAS<br>
                <div id="li-box"></div>
            </div>
        </div>

        <canvas id="maze-canvas" width="560" height="620"></canvas>

        <div id="start-screen" class="screen">
            <div class="welcome-msg">BEM-VINDO AO PAC-MAN</div>
            <div class="start-animation">
                <div class="anim-wrapper">
                    <div class="anim-pacman"></div>
                    <div class="anim-ghost"></div>
                </div>
            </div>
            <button class="btn" onclick="game.start()">INSERIR FICHA</button>
            <p style="color:#666; font-size:9px; margin-top:20px;">SETAS OU WASD PARA MOVER</p>
        </div>

        <div id="victory-screen" class="screen hidden">
            <h2 style="color: #ffd700; font-size: 24px;">VITÓRIA! 🏆</h2>
            <p id="vic-sc" style="color:#fff; margin: 20px 0;">PONTOS: 0</p>
            <p id="lv-req" class="level-note hidden">PRECISA DE 2600 PONTOS PARA O NÍVEL 2!</p>
            <button id="btn-next" class="btn hidden" onclick="game.nextLevel()">PRÓXIMO NÍVEL</button>
            <button class="btn" onclick="game.retry()">RECOMEÇAR</button>
        </div>

        <div id="over-screen" class="screen hidden">
            <h2 style="color: #f00; font-size: 24px; margin-bottom: 30px;">GAME OVER</h2>
            <div class="death-animation">
                <div class="anim-ghost death-ghost"></div>
                <div class="anim-pacman death-pacman"></div>
            </div>
            <p id="final-sc" style="color:#fff; margin: 20px 0;">PONTOS: 0</p>
            <button class="btn" onclick="game.retry()">TENTAR NOVAMENTE</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>

</html>
